<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="30" fill="#1e1e1e" stroke="#00c8c8" stroke-width="2"/>
  <!-- Waveform-style morph arrow: A side (teal) -->
  <polyline points="8,40 14,28 18,36 22,20 26,40"
            fill="none" stroke="#00c8c8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow pointing right -->
  <line x1="28" y1="32" x2="36" y2="32" stroke="#505050" stroke-width="2"/>
  <polyline points="34,28 38,32 34,36" fill="none" stroke="#505050" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Waveform-style morph arrow: B side (amber) -->
  <polyline points="38,40 42,32 46,38 50,24 56,40"
            fill="none" stroke="#c87800" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
